<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Team</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>
    <main>
        <div class="container">
            <div class="title-team mt-3">
                <h1 class="text-primary text-center">Meet our Teams</h1>
                <p class="mt-3">Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolor voluptatum modi,
                    explicabo aspernatur
                    porro veritatis quod odio harum. Enim, quibusdam! Quidem quibusdam nulla non omnis ipsa natus
                    mollitia
                    magnam iure?</p>
            </div>
            <div class="container-card mt-3">
                <div class="row row-cols-3" id="card-row">
                </div>
            </div>
            <section class="">
                <form class="row row-cols-2">
                    <div class="col mt-4">
                        <label for="inputName" class="form-label">Complete Name</label>
                        <input type="text" name="inputName" id="inputName" class="form-control" required>
                    </div>
                    <div class="col mt-4">
                        <label for="inputRole" class="form-label">Role</label>
                        <input type="text" name="inputRole" id="inputRole" class="form-control" required>
                    </div>
                    <div class="col mt-4">
                        <label for="inputEmail" class="form-label">Email</label>
                        <input type="email" name="inputEmail" id="inputEmail" class="form-control" required>
                    </div>
                    <div class="col mt-4">
                        <label for="inputImg" class="form-label">Name Image</label>
                        <input type="text" name="inputImg" id="inputImg" class="form-control" required>
                    </div>
                    <div class="col mt-4">
                        <button type="submit">Add new Member</button>
                    </div>
                </form>
            </section>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>

</html>
